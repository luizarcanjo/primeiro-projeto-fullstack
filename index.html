<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colegio</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="row">
        <div class="col s12 ">
            <ul class="tabs">
                <li class="tab col s6"><a class="active" href="#cadProf">Professores</a></li>
                <li class="tab col s6"><a href="#cadAlunos">Alunos</a></li>
            </ul>
        </div>
        <div id="cadProf" class="col s12">
            <div class="container center-align">
                <h1 class="header adjust-top center orange-text"> Cad PROFESSORES</h1>
                <br />
                <div>
                    <form id="formProf" class="col s12">
                        <div class="row">
                            <div class="input-field col s2">
                                <input id="nome-prof" type="text" class="validate">
                                <label for="nome-prof">Nome completo</label>
                            </div>

                            <div class="input-field col s2">
                                <input id="telefone" type="tel" class="validate">
                                <label for="telefone">Telefone</label>
                            </div>

                            <div class="input-field col s2">
                                <input id="idade" type="text" class="validate">
                                <label for="idade">Idade</label>
                            </div>

                            <div class="input-field col s2">
                                <input id="cadeira" type="tel" class="validate">
                                <label for="cadeira">Cadeira</label>
                            </div>

                            <div class="input-field col s2">
                                <input id="email" type="tel" class="validate">
                                <label for="email">Email</label>
                            </div>
                            <button class="btn waves-effect waves-light" type="submit" name="action">Submit




                            </button>
                        </div>
                    </form>
                </div>

                <div>
                    <br />
                    <ul id="listaProf" class = "container col s12" ></ul>
                </div>

            </div>

        </div>

        <div id="cadAlunos" class="col s12">
            <div class="container text-allign center">
                <h1 class="header adjust-top center orange-text"> Cad ALUNOS</h1>

                <br />
                <div class="container center-align">
                    <form id="form-alunos" class="col s12">
                        <div class="row">
                            <div class="input-field col s2">
                                <input id="nome-aluno" type="text" class="validate">
                                <label for="nome-aluno">Nome completo</label>
                            </div>

                            <div class="input-field col s2">
                                <input id="telefone-aluno" type="tel" class="validate">
                                <label for="telefone">Telefone</label>
                            </div>


                            <div class="input-field col s2">
                                <input id="idade-aluno" type="text" class="validate">
                                <label for="idade-aluno">Idade</label>
                            </div>

                            <div class="input-field col s2">
                                <input id="email-aluno" type="tel" class="validate">
                                <label for="email-aluno">Email</label>
                            </div>

                            <button class="btn waves-effect waves-light" type="submit" name="action">Submit
                            </button>
                            <ul id="listaAlunos"></ul>

                        </div>
                    </form>
                </div>

                <div>
                    <br />
                    <ul id="listaAlunos" class="container col s12"></ul>
                </div>

            </div>
        </div>

    </div>


    <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="init.js"></script>
    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colegio</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="container center-align">
    <h1>Sistema de atualizacao professores e alunos</h1>
    
    <br />
    <h3>Cadastro de alunos</h3>
    
    <br />
    <div class="container center-align">
        <form class="form-alunos col s8">
            <div class="row">
                <div class="input-field col s2">
                    <input id="nome_comp" type="text" class="validate">
                    <label for="nome_comp">Nome completo</label>
                </div>

                <div class="input-field col s2">
                    <input id="telefone" type="tel" class="validate">
                    <label for="telefone">Telefone</label>
                </div>

                <div class="input-field col s2">
                    <input id="idade" type="text" class="validate">
                    <label for="idade">Idade</label>
                </div>

                <div class="input-field col s2">
                    <input id="sexo" type="tel" class="validate">
                    <label for="sexo">Sexo</label>
                </div>

                <div class="input-field col s2">
                    <input id="email" type="tel" class="validate">
                    <label for="email">Email</label>
                </div>
                <button class="btn waves-effect waves-light" type="submit" name="action">Submit

                </button>
            </div>
        </form>
    </div>
    <br />
    <br />

    <h3>Cadastro de professores</h3>
    <br />
    <div class="container center-align">
        <form class="formProf col s8">
            <div class="row">
                <div class="input-field col s2">
                    <input id="nome_comp" type="text" class="validate">
                    <label for="nome_comp">Nome completo</label>
                </div>

                <div class="input-field col s2">
                    <input id="telefone" type="tel" class="validate">
                    <label for="telefone">Telefone</label>
                </div>

                <div class="input-field col s2">
                    <input id="idade" type="text" class="validate">
                    <label for="idade">Idade</label>
                </div>

                <div class="input-field col s2">
                    <input id="cadeira" type="tel" class="validate">
                    <label for="cadeira">Cadeira</label>
                </div>

                <div class="input-field col s2">
                    <input id="email" type="tel" class="validate">
                    <label for="email">Email</label>
                </div>
                <button class="btn waves-effect waves-light" type="submit" name="action">Submit

                </button>
            </div>
        </form>
    </div>
    <br />
    </div>
    



    <ul id="listaProf"></ul>
    <ul id="listaAlunos"></ul>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
